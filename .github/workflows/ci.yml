name: CI

on:
  push:
  pull_request:

jobs:
  dev-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate helper tooling
        run: |
          sh -n scripts/check-in-docker.sh
          make help

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -e apps/api

      - name: Run Alembic check (imports)
        run: |
          python -m compileall apps/api/app apps/api/alembic

      - name: Run API tests
        run: |
          cd apps/api
          pytest -q

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package.json

      - name: Install web deps
        run: npm --prefix apps/web install

      - name: Build web
        run: npm --prefix apps/web run build
